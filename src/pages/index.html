<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Task Manager - Manage your task efficiently">
    <meta name="keywords" content="Task. Manager, Management">
    <meta name="author" content="Jorge Gomez">
    <title>Task Manager - Sign In</title>

    <!-- SEO -->
    <meta property="og:title" content="Task Manager - Sign In">
    <meta property="og:description" content="Task Manager - Manage your task efficiently">
    <meta property="og:type" content="Website">

    <!-- Graph SEO -->
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon-16x16.png">
    <link rel="manifest" href="../assets/images/site.webmanifest">
    <link rel="icon" href="../assets/images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../styles/style.min.css">

    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/uuid/8.3.2/uuid.min.js"></script>
    <script
      defer
      src="https://kit.fontawesome.com/8df9994193.js"
      crossorigin="anonymous"
    ></script>
    <script defer type="module" src="../../dist/authentication.bundle.js"></script>
</head>
<body>
  <main class="login-container" id="main">
    <figure class="background-image">
        <img src="../assets/images/signin-todo.jpg" alt="Wooden surface with metal bolts">
    </figure>
    <section class="form-section">
        <header class="auth-header">
          <button id="signin-header-btn" class="auth-header-btn active">Sign In</button>
          <button id="signup-header-btn" class="auth-header-btn">Sign Up</button>
        </header>
        <form class="auth-signin-form" id="signIn-form">
            <label class="auth-label" for="email">Your Email</label>
            <fieldset class="input-wrapper">
              <input type="email" id="email" name="email" placeholder="you@example.com">
            </fieldset>
            <label class="auth-label" for="password">Password</label>
            <fieldset class="input-wrapper">
              <input type="password" id="password" name="password" placeholder="Enter your password">
              <i id="open-eye-icon" class="fa-solid fa-eye-slash toggle-icon"></i>
              <i id="close-eye-icon" class="fa-solid fa-eye toggle-icon"></i>
            </fieldset>
          
            <a class="forgot-password" href="/forgot-password">Forgot password?</a>
            
            <button id="sign-in-btn" type="submit" data-auth-button="">Sign In</button>
            <button type="button" class="google-signin">Sign in with Google</button>
        </form>
        <form class="auth-signup-form" id="signUp-form">
          <label class="auth-label" for="signup-email">Your Email</label>
          <fieldset class="input-wrapper">
            <input type="email" id="signup-email" name="email" placeholder="you@example.com">
          </fieldset>
          <label class="auth-label" for="signup-password">Password</label>
          <fieldset class="input-wrapper">
            <input type="password" id="signup-password" name="password" placeholder="Enter your password">
            <i id="signup-open-eye-icon" class="fa-solid fa-eye-slash toggle-icon"></i>
            <i id="signup-close-eye-icon" class="fa-solid fa-eye toggle-icon"></i>
          </fieldset>
          <label class="auth-label" for="conform-password">Confirm Password</label>
          <fieldset class="input-wrapper">
            <input type="password" id="conform-password" name="password" placeholder="Enter your password">
            <i id="confirm-open-eye-icon" class="fa-solid fa-eye-slash toggle-icon"></i>
            <i id="confirm-close-eye-icon" class="fa-solid fa-eye toggle-icon"></i>
          </fieldset>
          
          <button id="sign-up-btn" type="submit" data-auth-button="">Sign Up</button>
          <button type="button" class="google-signin">Sign un with Google</button>
        </form>
        <footer>
            <a href="/privacy">Privacy</a>
            <a href="/terms">Terms</a>
            <a href="/about">About</a>
        </footer>
    </section>
</body>
</html>
